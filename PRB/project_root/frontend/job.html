<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جزئیات شغل</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .main-header {
      background-color: #673ab7;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 1.5rem;
    }

    .subtitle {
      text-align: center;
      margin: 1rem 0;
      color: #555;
    }

    .job-detail-box {
      max-width: 600px;
      margin: 1rem auto;
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      line-height: 1.8;
    }

    .job-detail-box p {
      margin: 0.5rem 0;
    }

    .chat-button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #7b4dff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <header class="main-header">جزئیات شغل</header>

  <section class="subtitle">
    اطلاعات کامل شغل انتخاب‌شده را در زیر مشاهده می‌کنید
  </section>

  <main>
    <div id="job-details" class="job-detail-box">
      <p>در حال بارگذاری اطلاعات شغل...</p>
    </div>
  </main>

  <script src="./js/job.js"></script>
</body>
</html>
